  <!-- Center band -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Center button outer -->
  <circle cx="32" cy="32" r="9" fill="#1a1a1a"/>
  <!-- Center button inner -->
  <circle cx="32" cy="32" r="6" fill="#ffffff"/>
  <!-- Center button highlight -->
