server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy GitHub OAuth device-flow endpoints to avoid CORS issues.
    # Requests to /github-oauth/... are forwarded to https://github.com/...
    location /github-oauth/ {
        proxy_pass https://github.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Support client-side routing by redirecting unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
