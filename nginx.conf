server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy only the required GitHub OAuth device-flow endpoints to avoid CORS issues.
    location = /github-oauth/login/device/code {
        limit_except POST { return 405; }
        proxy_pass https://github.com/login/device/code;
        proxy_ssl_server_name on;
        proxy_set_header Host github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    location = /github-oauth/login/oauth/access_token {
        limit_except POST { return 405; }
        proxy_pass https://github.com/login/oauth/access_token;
        proxy_ssl_server_name on;
        proxy_set_header Host github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    location ^~ /github-oauth/ {
        return 404;
    }
    # Support client-side routing by redirecting unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
