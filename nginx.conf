server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Use Docker's embedded DNS so nginx can resolve upstream hostnames at runtime.
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Place the upstream hostname in a variable so that nginx resolves it through the
    # runtime resolver (127.0.0.11) on every request instead of only once at startup.
    # A stale startup-time IP is the most common cause of persistent 502 errors when
    # proxying to external HTTPS hosts in Docker.
    set $github_host github.com;

    # Proxy only the required GitHub OAuth device-flow endpoints to avoid CORS issues.
    location = /github-oauth/login/device/code {
        proxy_pass https://$github_host/login/device/code;
        proxy_ssl_server_name on;
        proxy_ssl_name github.com;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_http_version 1.1;
        proxy_set_header Host github.com;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    location = /github-oauth/login/oauth/access_token {
        proxy_pass https://$github_host/login/oauth/access_token;
        proxy_ssl_server_name on;
        proxy_ssl_name github.com;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_http_version 1.1;
        proxy_set_header Host github.com;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    location ^~ /github-oauth/ {
        return 404;
    }
    # Support client-side routing by redirecting unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
