server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Use Docker's embedded DNS so nginx can resolve upstream hostnames at runtime.
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Proxy only the required GitHub OAuth device-flow endpoints to avoid CORS issues.
    # Note: avoid using `if` blocks here — the nginx "if is evil" problem causes
    # proxy_set_header directives to be silently ignored when `if` is present in the
    # same location block, which breaks the Host header and returns an HTML error from GitHub.
    location = /github-oauth/login/device/code {
        proxy_pass https://github.com/login/device/code;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    location = /github-oauth/login/oauth/access_token {
        proxy_pass https://github.com/login/oauth/access_token;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    location ^~ /github-oauth/ {
        return 404;
    }
    # Support client-side routing by redirecting unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
